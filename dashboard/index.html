<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flare — Log Anomaly Detection</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #db6d28;
    --red: #f85149;
    --red-dim: #da3633;
    --purple: #bc8cff;
    --radius: 6px;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ────────────────────────────────────────── */
  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  header h1 span {
    color: var(--accent);
  }

  header .version {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 10px;
  }

  header .health-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-left: auto;
  }

  header .health-dot.ok { background: var(--green); }
  header .health-dot.err { background: var(--red); }

  header .health-label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  header .tab-group {
    display: flex;
    gap: 2px;
    margin-left: 24px;
  }

  header .tab-btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }

  header .tab-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
  header .tab-btn.active { color: var(--accent); background: var(--bg-tertiary); border-color: var(--border); }

  /* ── Metrics Panel ──────────────────────────────────── */
  .metrics-view {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: none;
  }

  .metrics-view.visible { display: block; }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .metric-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .metric-card h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .metric-big {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: var(--mono);
  }

  .metric-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .metric-bar-group { margin-top: 12px; }

  .metric-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .metric-bar-track {
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .metric-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .metrics-raw {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .metrics-raw h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .metrics-raw pre {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }

  /* ── Input Area ────────────────────────────────────── */
  .input-area {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .input-area textarea {
    width: 100%;
    height: 120px;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    resize: vertical;
    outline: none;
  }

  .input-area textarea:focus {
    border-color: var(--accent);
  }

  .input-area textarea::placeholder {
    color: var(--text-muted);
  }

  .input-controls {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent-dim);
    color: #fff;
    border-color: var(--accent-dim);
  }

  .btn-primary:hover { background: var(--accent); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  .btn-secondary:hover { border-color: var(--text-secondary); }

  .input-controls label {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .input-controls input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .input-controls input[type="file"] { display: none; }

  .input-controls .spacer { flex: 1; }

  .input-controls .status {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  /* ── Main Layout ───────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Incident List (left) ──────────────────────────── */
  .incident-list {
    width: 360px;
    min-width: 300px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg-secondary);
  }

  .incident-list .list-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
  }

  .incident-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .incident-card:hover { background: var(--bg-tertiary); }
  .incident-card.active { background: var(--bg-tertiary); border-left: 3px solid var(--accent); }

  .incident-card .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .severity-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }

  .severity-critical { background: var(--red-dim); color: #fff; }
  .severity-high { background: var(--orange); color: #fff; }
  .severity-medium { background: var(--yellow); color: #1a1a1a; }
  .severity-low { background: var(--green); color: #1a1a1a; }
  .severity-unknown { background: var(--text-muted); color: #fff; }

  .incident-card .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .incident-card .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── Detail Panel (right) ──────────────────────────── */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    background: var(--bg-primary);
  }

  .detail-panel .no-selection {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
  }

  .detail-section {
    margin-bottom: 24px;
  }

  .detail-section h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section p, .detail-section .content {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .detail-meta {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .meta-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }

  .meta-card .meta-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .meta-card .meta-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin-top: 4px;
  }

  .remediation-list {
    list-style: none;
  }

  .remediation-list li {
    padding: 8px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    font-size: 13px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .remediation-list .priority-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .log-lines-toggle {
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    margin-bottom: 8px;
    display: inline-block;
  }

  .log-lines-toggle:hover { text-decoration: underline; }

  .log-lines {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    max-height: 300px;
    overflow-y: auto;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .eval-scores {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .eval-score-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    text-align: center;
  }

  .eval-score-card .score-label {
    font-size: 11px;
    color: var(--text-muted);
  }

  .eval-score-card .score-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }

  /* ── Stats Bar (bottom) ────────────────────────────── */
  .stats-bar {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .stats-bar .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stats-bar .stat-value {
    color: var(--text-primary);
    font-weight: 600;
    font-family: var(--mono);
  }

  /* ── Loading spinner ───────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar ─────────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1><span>Flare</span></h1>
  <span class="version" id="version">v--</span>
  <div class="tab-group">
    <button class="tab-btn active" onclick="switchTab('analyze')">Analyze</button>
    <button class="tab-btn" onclick="switchTab('metrics')">Metrics</button>
  </div>
  <div style="flex:1"></div>
  <div class="health-dot" id="healthDot"></div>
  <span class="health-label" id="healthLabel">checking...</span>
</header>

<!-- Input Area -->
<div class="input-area">
  <textarea id="logInput" placeholder="Paste log lines here...&#10;&#10;081109 203518 148 INFO dfs.DataNode$DataXceiver: Receiving block blk_-1608999687919862906 src: /10.251.73.220:42557 dest: /10.251.73.220:50010"></textarea>
  <div class="input-controls">
    <button class="btn btn-primary" id="analyzeBtn" onclick="runAnalyze()">Analyze Logs</button>
    <button class="btn btn-secondary" id="uploadBtn" onclick="document.getElementById('fileInput').click()">Upload .log</button>
    <input type="file" id="fileInput" accept=".log,.txt" onchange="handleFileUpload(event)">
    <label><input type="checkbox" id="evalCheck"> Run quality eval</label>
    <div class="spacer"></div>
    <span class="status" id="statusText"></span>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Incident List -->
  <div class="incident-list">
    <div class="list-header">Incidents <span id="incidentCount"></span></div>
    <div id="incidentListBody">
      <div class="empty-state">
        Run anomaly detection to see incidents here.
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel">
    <div class="no-selection" id="detailPlaceholder">
      Select an incident to view details
    </div>
    <div id="detailContent" style="display:none"></div>
  </div>
</div>

<!-- Metrics View (hidden by default) -->
<div class="metrics-view" id="metricsView">
  <div class="metrics-grid" id="metricsGrid"></div>
  <div class="metrics-raw">
    <h4>Raw Prometheus Metrics</h4>
    <pre id="metricsRaw">Loading metrics...</pre>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar">
  <div class="stat">Incidents: <span class="stat-value" id="statIncidents">--</span></div>
  <div class="stat">Critical: <span class="stat-value" style="color:var(--red)" id="statCritical">--</span></div>
  <div class="stat">High: <span class="stat-value" style="color:var(--orange)" id="statHigh">--</span></div>
  <div class="stat">Medium: <span class="stat-value" style="color:var(--yellow)" id="statMedium">--</span></div>
  <div class="stat">Low: <span class="stat-value" style="color:var(--green)" id="statLow">--</span></div>
  <div class="spacer" style="flex:1"></div>
  <div class="stat">Processing: <span class="stat-value" id="statTime">--</span></div>
  <div class="stat">Tokens: <span class="stat-value" id="statTokens">--</span></div>
  <div class="stat">Cost: <span class="stat-value" id="statCost">--</span></div>
</div>

<script>
const API_BASE = window.location.origin;
let currentData = null;
let selectedIdx = -1;

// ── Health Check ────────────────────────────────────────────
async function checkHealth() {
  try {
    const resp = await fetch(API_BASE + '/health');
    const data = await resp.json();
    document.getElementById('healthDot').className = 'health-dot ok';
    document.getElementById('healthLabel').textContent =
      'API ' + data.anthropic_api;
    document.getElementById('version').textContent = 'v' + data.version;
  } catch {
    document.getElementById('healthDot').className = 'health-dot err';
    document.getElementById('healthLabel').textContent = 'API unreachable';
  }
}

// ── File Upload ─────────────────────────────────────────────
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('logInput').value = e.target.result;
  };
  reader.readAsText(file);
}

// ── Run Analysis ────────────────────────────────────────────
async function runAnalyze() {
  const logText = document.getElementById('logInput').value.trim();
  if (!logText) return;

  const runEval = document.getElementById('evalCheck').checked;
  const btn = document.getElementById('analyzeBtn');
  const statusEl = document.getElementById('statusText');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analyzing...';
  statusEl.textContent = 'Running detection pipeline...';

  try {
    const resp = await fetch(API_BASE + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        log_text: logText,
        contamination: 0.03,
        run_eval: runEval,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || err.error || 'Request failed');
    }

    currentData = await resp.json();
    renderIncidentList();
    updateStats();
    statusEl.textContent = 'Done';
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Logs';
  }
}

// ── Severity Helpers ────────────────────────────────────────
function getSeverityFromScore(score) {
  if (score >= 0.5) return 'critical';
  if (score >= 0.3) return 'high';
  if (score >= 0.15) return 'medium';
  return 'low';
}

function getSeverityFromSummary(summary) {
  if (summary && summary.llm_summary) return summary.llm_summary.severity;
  return null;
}

function getSeverityLabel(incident, summary) {
  const fromLLM = getSeverityFromSummary(summary);
  if (fromLLM) return fromLLM;
  return getSeverityFromScore(incident.severity);
}

// ── Render Incident List ────────────────────────────────────
function renderIncidentList() {
  if (!currentData) return;

  const incidents = currentData.detection.incidents;
  const summaries = currentData.summaries || [];
  const container = document.getElementById('incidentListBody');
  const countEl = document.getElementById('incidentCount');

  countEl.textContent = '(' + incidents.length + ')';

  if (incidents.length === 0) {
    container.innerHTML = '<div class="empty-state">No anomalies detected in the provided logs.</div>';
    return;
  }

  container.innerHTML = '';
  incidents.forEach((inc, idx) => {
    const summary = summaries[idx] || null;
    const sev = getSeverityLabel(inc, summary);

    const card = document.createElement('div');
    card.className = 'incident-card';
    card.onclick = () => selectIncident(idx);

    const timeRange = (inc.time_range && inc.time_range[0])
      ? inc.time_range[0] + ' — ' + inc.time_range[1]
      : 'N/A';

    card.innerHTML = `
      <div class="card-top">
        <span class="severity-badge severity-${sev}">${sev}</span>
        <span class="card-title">Incident ${inc.incident_id}</span>
      </div>
      <div class="card-meta">
        <span>${inc.block_ids.length} block(s)</span>
        <span>${inc.log_lines.length} log lines</span>
        <span>score: ${inc.severity.toFixed(3)}</span>
      </div>
      <div class="card-meta" style="margin-top:2px">
        <span>${timeRange}</span>
      </div>
    `;

    container.appendChild(card);
  });

  // Auto-select the first incident
  if (incidents.length > 0) selectIncident(0);
}

// ── Select Incident ─────────────────────────────────────────
function selectIncident(idx) {
  selectedIdx = idx;

  // Update active card style
  const cards = document.querySelectorAll('.incident-card');
  cards.forEach((c, i) => c.classList.toggle('active', i === idx));

  const incidents = currentData.detection.incidents;
  const summaries = currentData.summaries || [];
  const inc = incidents[idx];
  const summary = summaries[idx] || null;
  const evalResults = currentData.eval_results;

  document.getElementById('detailPlaceholder').style.display = 'none';
  const content = document.getElementById('detailContent');
  content.style.display = 'block';

  const sev = getSeverityLabel(inc, summary);

  let html = '';

  // Meta cards
  html += '<div class="detail-meta">';
  html += `<div class="meta-card">
    <div class="meta-label">Severity</div>
    <div class="meta-value"><span class="severity-badge severity-${sev}">${sev.toUpperCase()}</span></div>
  </div>`;
  html += `<div class="meta-card">
    <div class="meta-label">Anomaly Score</div>
    <div class="meta-value">${inc.mean_anomaly_score.toFixed(4)}</div>
  </div>`;

  if (summary && summary.llm_summary) {
    html += `<div class="meta-card">
      <div class="meta-label">Confidence</div>
      <div class="meta-value">${(summary.llm_summary.confidence * 100).toFixed(0)}%</div>
    </div>`;
  } else {
    html += `<div class="meta-card">
      <div class="meta-label">Blocks</div>
      <div class="meta-value">${inc.block_ids.length}</div>
    </div>`;
  }
  html += '</div>';

  // LLM Explanation
  if (summary && summary.llm_summary) {
    const s = summary.llm_summary;
    html += `<div class="detail-section">
      <h3>Explanation</h3>
      <p>${escapeHtml(s.explanation)}</p>
    </div>`;

    html += `<div class="detail-section">
      <h3>Root Cause</h3>
      <p>${escapeHtml(s.root_cause)}</p>
    </div>`;

    if (s.remediation && s.remediation.length > 0) {
      html += '<div class="detail-section"><h3>Remediation</h3><ul class="remediation-list">';
      s.remediation.forEach(step => {
        html += `<li>
          <span class="priority-tag">${escapeHtml(step.priority)}</span>
          ${escapeHtml(step.action)}
        </li>`;
      });
      html += '</ul></div>';
    }

    html += `<div class="detail-section">
      <h3>Severity Reasoning</h3>
      <p>${escapeHtml(s.severity_reasoning)}</p>
    </div>`;
  } else {
    html += `<div class="detail-section">
      <h3>LLM Summary</h3>
      <p style="color:var(--text-muted)">No LLM summary available. The /analyze endpoint generates summaries when the Anthropic API key is configured.</p>
    </div>`;
  }

  // Eval scores
  if (evalResults) {
    html += `<div class="detail-section">
      <h3>Quality Evaluation</h3>
      <div class="eval-scores">
        <div class="eval-score-card">
          <div class="score-label">Relevance</div>
          <div class="score-value">${evalResults.mean_relevance.toFixed(1)}/5</div>
        </div>
        <div class="eval-score-card">
          <div class="score-label">Specificity</div>
          <div class="score-value">${evalResults.mean_specificity.toFixed(1)}/5</div>
        </div>
        <div class="eval-score-card">
          <div class="score-label">Actionability</div>
          <div class="score-value">${evalResults.mean_actionability.toFixed(1)}/5</div>
        </div>
      </div>
    </div>`;
  }

  // Log lines (collapsible)
  if (inc.log_lines && inc.log_lines.length > 0) {
    const logId = 'logs-' + idx;
    html += `<div class="detail-section">
      <h3>Raw Log Lines</h3>
      <span class="log-lines-toggle" onclick="toggleLogs('${logId}')">
        Show ${inc.log_lines.length} log lines
      </span>
      <div class="log-lines" id="${logId}" style="display:none">${escapeHtml(inc.log_lines.join('\n'))}</div>
    </div>`;
  }

  // Block IDs
  html += `<div class="detail-section">
    <h3>Block IDs</h3>
    <div class="log-lines">${escapeHtml(inc.block_ids.join('\n'))}</div>
  </div>`;

  content.innerHTML = html;
}

function toggleLogs(id) {
  const el = document.getElementById(id);
  const toggle = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    toggle.textContent = 'Hide log lines';
  } else {
    el.style.display = 'none';
    toggle.textContent = 'Show ' + el.textContent.split('\n').length + ' log lines';
  }
}

// ── Update Stats Bar ────────────────────────────────────────
function updateStats() {
  if (!currentData) return;

  const incidents = currentData.detection.incidents;
  const summaries = currentData.summaries || [];

  document.getElementById('statIncidents').textContent = incidents.length;

  let counts = { critical: 0, high: 0, medium: 0, low: 0 };
  incidents.forEach((inc, idx) => {
    const sev = getSeverityLabel(inc, summaries[idx] || null);
    if (counts.hasOwnProperty(sev)) counts[sev]++;
  });

  document.getElementById('statCritical').textContent = counts.critical;
  document.getElementById('statHigh').textContent = counts.high;
  document.getElementById('statMedium').textContent = counts.medium;
  document.getElementById('statLow').textContent = counts.low;

  document.getElementById('statTime').textContent =
    currentData.total_processing_time_ms + 'ms';

  document.getElementById('statTokens').textContent =
    currentData.total_tokens ? currentData.total_tokens.toLocaleString() : '0';

  document.getElementById('statCost').textContent =
    currentData.estimated_cost_usd
      ? '$' + currentData.estimated_cost_usd.toFixed(4)
      : '$0.00';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Tab Switching ────────────────────────────────────────────
function switchTab(tab) {
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === tab));

  const analyzeEls = [
    document.querySelector('.input-area'),
    document.querySelector('.main'),
    document.getElementById('statsBar'),
  ];
  const metricsEl = document.getElementById('metricsView');

  if (tab === 'metrics') {
    analyzeEls.forEach(el => el.style.display = 'none');
    metricsEl.classList.add('visible');
    fetchMetrics();
  } else {
    analyzeEls.forEach(el => el.style.display = '');
    metricsEl.classList.remove('visible');
  }
}

// ── Metrics Fetching & Rendering ─────────────────────────────
async function fetchMetrics() {
  try {
    const resp = await fetch(API_BASE + '/metrics');
    const raw = await resp.text();
    document.getElementById('metricsRaw').textContent = raw;
    renderMetricCards(raw);
  } catch {
    document.getElementById('metricsRaw').textContent = 'Failed to fetch metrics';
  }
}

function parsePrometheusMetrics(raw) {
  const metrics = {};
  const lines = raw.split('\n');
  for (const line of lines) {
    if (!line || line.startsWith('#')) continue;
    const match = line.match(/^([a-zA-Z_]+)(?:\{([^}]*)\})?\s+([\d.eE+-]+)$/);
    if (match) {
      const [, name, labels, value] = match;
      if (!metrics[name]) metrics[name] = [];
      metrics[name].push({ labels: labels || '', value: parseFloat(value) });
    }
  }
  return metrics;
}

function renderMetricCards(raw) {
  const m = parsePrometheusMetrics(raw);
  const grid = document.getElementById('metricsGrid');
  const cards = [];

  // Uptime
  if (m['flare_uptime_seconds']) {
    const secs = m['flare_uptime_seconds'][0].value;
    const mins = Math.floor(secs / 60);
    const hrs = Math.floor(mins / 60);
    const display = hrs > 0 ? hrs + 'h ' + (mins % 60) + 'm' : mins + 'm ' + Math.floor(secs % 60) + 's';
    cards.push(metricCard('Uptime', display, Math.floor(secs) + ' seconds'));
  }

  // Total requests
  if (m['flare_http_requests_total']) {
    const total = m['flare_http_requests_total'].reduce((s, e) => s + e.value, 0);
    const byStatus = {};
    m['flare_http_requests_total'].forEach(e => {
      const st = (e.labels.match(/status="(\d+)"/) || [])[1] || '???';
      byStatus[st] = (byStatus[st] || 0) + e.value;
    });
    let sub = Object.entries(byStatus).map(([k, v]) => k + ': ' + v).join(' / ');
    cards.push(metricCard('HTTP Requests', total.toLocaleString(), sub));
  }

  // Detection runs
  if (m['flare_detection_runs_total']) {
    const runs = m['flare_detection_runs_total'][0].value;
    const anomalies = m['flare_anomalies_detected_total'] ? m['flare_anomalies_detected_total'][0].value : 0;
    const incidents = m['flare_incidents_clustered_total'] ? m['flare_incidents_clustered_total'][0].value : 0;
    cards.push(metricCard('Detection Runs', runs.toLocaleString(), anomalies + ' anomalies / ' + incidents + ' incidents'));
  }

  // LLM usage
  if (m['flare_llm_requests_total']) {
    const reqs = m['flare_llm_requests_total'][0].value;
    const cost = m['flare_llm_cost_usd_total'] ? m['flare_llm_cost_usd_total'][0].value : 0;
    const tokenEntries = m['flare_llm_tokens_total'] || [];
    let inputTk = 0, outputTk = 0;
    tokenEntries.forEach(e => {
      if (e.labels.includes('type="input"')) inputTk = e.value;
      if (e.labels.includes('type="output"')) outputTk = e.value;
    });
    cards.push(metricCard('LLM Calls', reqs.toLocaleString(), '$' + cost.toFixed(4) + ' total cost'));
    cards.push(metricCard('LLM Tokens', (inputTk + outputTk).toLocaleString(), inputTk.toLocaleString() + ' in / ' + outputTk.toLocaleString() + ' out'));
  }

  // Request latency
  if (m['flare_http_request_duration_seconds_count']) {
    const count = m['flare_http_request_duration_seconds_count'][0].value;
    const sum = m['flare_http_request_duration_seconds_sum'] ? m['flare_http_request_duration_seconds_sum'][0].value : 0;
    const avg = count > 0 ? (sum / count * 1000).toFixed(0) : '0';
    cards.push(metricCard('Avg Latency', avg + 'ms', count + ' requests sampled'));
  }

  // LLM latency
  if (m['flare_llm_latency_seconds_count']) {
    const count = m['flare_llm_latency_seconds_count'][0].value;
    const sum = m['flare_llm_latency_seconds_sum'] ? m['flare_llm_latency_seconds_sum'][0].value : 0;
    const avg = count > 0 ? (sum / count * 1000).toFixed(0) : '0';
    cards.push(metricCard('Avg LLM Latency', avg + 'ms', count + ' calls'));
  }

  // Last detection stats (gauges)
  if (m['flare_last_detection_blocks']) {
    const blocks = m['flare_last_detection_blocks'][0].value;
    const anomalies = m['flare_last_detection_anomalies'] ? m['flare_last_detection_anomalies'][0].value : 0;
    const rate = blocks > 0 ? (anomalies / blocks * 100).toFixed(1) : '0';
    cards.push(metricCardWithBar('Last Detection', rate + '% anomaly rate', anomalies + ' of ' + blocks + ' blocks', parseFloat(rate)));
  }

  grid.innerHTML = cards.join('');
}

function metricCard(title, value, sub) {
  return `<div class="metric-card">
    <h4>${title}</h4>
    <div class="metric-big">${value}</div>
    <div class="metric-sub">${sub}</div>
  </div>`;
}

function metricCardWithBar(title, value, sub, pct) {
  const color = pct > 20 ? 'var(--red)' : pct > 10 ? 'var(--orange)' : pct > 5 ? 'var(--yellow)' : 'var(--green)';
  return `<div class="metric-card">
    <h4>${title}</h4>
    <div class="metric-big">${value}</div>
    <div class="metric-sub">${sub}</div>
    <div class="metric-bar-group">
      <div class="metric-bar-track">
        <div class="metric-bar-fill" style="width:${Math.min(pct, 100)}%;background:${color}"></div>
      </div>
    </div>
  </div>`;
}

checkHealth();
